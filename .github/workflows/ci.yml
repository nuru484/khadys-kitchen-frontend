name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest

    env:
      # Required by the fail-fast env module. Build-time fetches against the
      # placeholder fail gracefully (pages fall back to empty data).
      NEXT_PUBLIC_SERVER_URI: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # next-env.d.ts is gitignored (it references generated .next types), so a
      # fresh checkout has no image/route module declarations until typegen
      # recreates them - without this, tsc fails on static image imports.
      - name: Generate Next.js types
        run: npx next typegen

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
